version: 4.1.35
steps:
  - prompt: Locate the "Contact Us" link in the navigation bar.
    commands:
      - command: hover-text
        text: Контакты
        description: contact us link in the navigation bar
        action: click
  - prompt: Click the "Contact Us" link.
    commands:
      - command: hover-text
        text: Контакты
        description: contact us link in the navigation bar
